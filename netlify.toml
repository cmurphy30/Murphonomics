[build]
  publish = "."
  functions = "netlify/functions"

[build.environment]
  # Node 18+ has fetch built in — no extra packages needed in the functions
  NODE_VERSION = "18"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["@netlify/blobs"]

[[plugins]]
  package = "@netlify/plugin-functions-install-core"
